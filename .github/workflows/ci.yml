name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Fast unit-coverage job: pure Go, no JDK, Linux only. Runs on every PR.
  build-and-test:
    name: Build, Vet, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Tidy
        run: go mod tidy -diff

      - name: Test
        run: go test ./... -timeout 300s

  # Skip-guard: reject undocumented test skips (rmp #4722). A t.Skip is tracked
  # debt; every skip must carry a non-empty reason (see docs/skipped-tests-audit.md).
  skip-guard:
    name: Skip guard (no undocumented t.Skip)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for undocumented skips
        run: bash scripts/check-skips.sh

  # Race-detector job. The Go race detector (ThreadSanitizer) requires a 48-bit
  # virtual address space, which GitHub's ubuntu-latest (x86_64) provides but
  # some ARM64 hosts (47-bit VMA) do not — hence this dedicated x86_64 job so
  # data races are caught in CI even when contributors develop on ARM64.
  race:
    name: Race detector (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with -race
        run: go test -race ./... -timeout 900s

  # Fuzz smoke job. Runs each native Go fuzz target for a short, bounded time
  # against its seed corpus plus engine-mutated inputs. The contract is "no
  # crash": a panic, hang, or other failure on untrusted parsing input fails
  # the build. This is a smoke test, not exhaustive fuzzing — see
  # CONTRIBUTING.md ("Fuzz testing") for longer local runs.
  fuzz:
    name: Fuzz (parsing smoke)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz query parser
        run: go test -run='^$' -fuzz='^FuzzQueryParser$' -fuzztime=30s ./queryparser/

      - name: Fuzz StandardTokenizer
        run: go test -run='^$' -fuzz='^FuzzStandardTokenizer$' -fuzztime=30s ./analysis/

      - name: Fuzz Lucene90 compound entries reader
        run: go test -run='^$' -fuzz='^FuzzLucene90CompoundEntriesRead$' -fuzztime=30s ./codecs/

  # Binary-compatibility gate (Sprint 114). MUST be a required status check
  # for merges to main — see CONTRIBUTING.md ("Binary compatibility (mandatory)").
  compat:
    name: Compat (Lucene 10.4.0 byte-parity)
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25.x', 'stable']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('tools/lucene-fixtures/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Lucene fixture harness
        run: mvn -B -q -f tools/lucene-fixtures/pom.xml verify

      - name: Corpus baseline (Sprint 114 T3)
        if: runner.os != 'Windows'
        env:
          CORPUS_DIR: ${{ runner.temp }}/gocene-corpus-baseline
        run: make -f tools/lucene-fixtures/Makefile corpus-baseline

      - name: Combined-scenario compat tests (Sprint 114 T5)
        env:
          GOCENE_COMPAT_HARNESS: '1'
          LUCENE_FIXTURES_JAR: ${{ github.workspace }}/tools/lucene-fixtures/target/lucene-fixtures.jar
        run: go test ./internal/compat/scenarios/... -timeout 600s

      - name: Per-package compat tests (Lucene round-trip)
        env:
          GOCENE_COMPAT_HARNESS: '1'
          LUCENE_FIXTURES_JAR: ${{ github.workspace }}/tools/lucene-fixtures/target/lucene-fixtures.jar
        run: go test -tags compat ./... -timeout 600s

      # On failure: collect structured diagnostic output (verify-diagnostic JSON,
      # scenario TSV mismatches, mvn surefire reports) into a single artefact.
      - name: Collect failure diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          out="compat-failure-${{ github.run_id }}-${{ matrix.os }}-${{ matrix.go }}"
          mkdir -p "$out"
          # Maven surefire/failsafe XML reports, if any.
          if [ -d tools/lucene-fixtures/target ]; then
            find tools/lucene-fixtures/target -type d \
              \( -name surefire-reports -o -name failsafe-reports \) \
              -exec cp -r {} "$out/" \; 2>/dev/null
          fi
          # Any TSV/JSON diagnostic dropped under the runner temp dir.
          if [ -n "${RUNNER_TEMP:-}" ] && [ -d "$RUNNER_TEMP" ]; then
            find "$RUNNER_TEMP" -maxdepth 4 \
              \( -name '*.tsv' -o -name '*.json' \) \
              -exec cp --parents {} "$out/" \; 2>/dev/null
          fi
          tar -czf "${out}.tar.gz" "$out" || true
          ls -la "${out}.tar.gz" || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compat-failure-${{ github.run_id }}-${{ matrix.os }}-${{ matrix.go }}
          path: compat-failure-${{ github.run_id }}-*.tar.gz
          if-no-files-found: ignore
          retention-days: 14
