name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Vet, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('tools/lucene-fixtures/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Lucene fixture harness (Sprint 114 T2)
        run: mvn -B -q -f tools/lucene-fixtures/pom.xml verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Tidy
        run: go mod tidy -diff

      - name: Test
        run: go test ./... -timeout 300s

      - name: Combined-scenario compat tests (Sprint 114 T5)
        # Run BEFORE the per-package compat suite so end-to-end divergence
        # fails CI fast and surfaces a single, scenario-level signal.
        env:
          GOCENE_COMPAT_HARNESS: '1'
          LUCENE_FIXTURES_JAR: ${{ github.workspace }}/tools/lucene-fixtures/target/lucene-fixtures.jar
        run: go test ./internal/compat/scenarios/... -timeout 600s

      - name: Compat tests (Lucene round-trip)
        env:
          GOCENE_COMPAT_HARNESS: '1'
          LUCENE_FIXTURES_JAR: ${{ github.workspace }}/tools/lucene-fixtures/target/lucene-fixtures.jar
        run: go test -tags compat ./internal/compat/... -timeout 300s

      - name: Corpus baseline (Sprint 114 T3)
        env:
          CORPUS_DIR: ${{ runner.temp }}/gocene-corpus-baseline
        run: make -f tools/lucene-fixtures/Makefile corpus-baseline
